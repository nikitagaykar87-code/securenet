<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script src="auth_guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureNet - Live Threat Browser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@600;700;800&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #070221;
            color: white;
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }

        .tech {
            font-family: 'Exo 2', sans-serif;
        }

        .glass-sidebar {
            background: rgba(15, 7, 50, 0.95);
            border-right: 1px solid rgba(124, 58, 237, 0.3);
        }

        .map-container {
            background: #000;
            position: relative;
        }

        .map-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid #7c3aed;
            pointer-events: none;
            z-index: 10;
        }

        /* Fixed: Removed @apply to prevent "Unknown at rule" errors */
        .source-btn {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            padding: 1rem;
            border-radius: 0.75rem;
            transition-property: all;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 150ms;
            border-width: 1px;
            text-align: left;
            margin-bottom: 0.75rem;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .source-btn:hover {
            background: rgba(124, 58, 237, 0.1);
            border-color: rgba(124, 58, 237, 0.5);
        }

        .source-btn.active {
            background: rgba(124, 58, 237, 0.2);
            border-color: #7c3aed;
        }

        .scroll-custom::-webkit-scrollbar {
            width: 5px;
        }

        .scroll-custom::-webkit-scrollbar-thumb {
            background: #4f46e5;
            border-radius: 10px;
        }
    </style>
</head>

<body class="flex flex-col" style="display:none">

    <header class="w-full h-16 glass-sidebar flex items-center justify-between px-8 z-50">
        <div class="flex items-center gap-4">
            <a href="homepage.html" class="p-2 hover:bg-white/10 rounded-lg transition">
                <i data-lucide="arrow-left" class="w-6 h-6"></i>
            </a>
            <h1 class="tech text-xl font-bold tracking-widest text-indigo-400">THREAT BROWSER</h1>
        </div>
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-2 text-xs font-bold text-red-500">
                <span class="relative flex h-2 w-2">
                    <span
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
                </span>
                LIVE THREAT INTELLIGENCE
            </div>
            <a href="homepage.html"
                class="bg-indigo-600 px-6 py-2 rounded-full text-xs font-bold hover:bg-indigo-500 transition shadow-lg shadow-indigo-900/40">EXIT
                COMMAND CENTER</a>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">

        <aside class="w-96 glass-sidebar p-6 hidden lg:flex flex-col overflow-y-auto scroll-custom">
            <h2 class="text-[10px] font-black uppercase text-gray-500 tracking-[0.2em] mb-6 flex items-center gap-2">
                <i data-lucide="database" class="w-3 h-3"></i> Intelligence Sources
            </h2>

            <div class="mb-4">
                <button
                    onclick="changeMap('https://cybermap.kaspersky.com/en/widget/', 'KASPERSKY REAL-TIME MAP', this)"
                    class="source-btn active">
                    <span class="text-xs font-bold text-white uppercase">Kaspersky Lab</span>
                    <p class="text-[10px] text-gray-400 leading-tight">Features a highly interactive 3D globe pulling
                        data from various scans, including mail anti-virus and botnet detection.</p>
                </button>
            </div>

            <div class="mb-4">
                <button onclick="changeMap('https://threatmap.fortiguard.com/', 'FORTIGUARD LABS MAP', this)"
                    class="source-btn">
                    <span class="text-xs font-bold text-white uppercase">FortiGuard Labs</span>
                    <p class="text-[10px] text-gray-400 leading-tight">Displays activity by region and includes a
                        'day/night' overlay showing where network activity increases after dark.</p>
                </button>
            </div>

            <div class="mb-4">
                <button onclick="changeMap('https://livethreatmap.radware.com/', 'RADWARE LIVE THREAT MAP', this)"
                    class="source-btn">
                    <span class="text-xs font-bold text-white uppercase">Radware Live Threat</span>
                    <p class="text-[10px] text-gray-400 leading-tight">Visualizes attacks based on its global threat
                        deception network sensors and cloud systems event information.</p>
                </button>
            </div>

            <div class="mb-4">
                <button onclick="changeMap('https://threatmap.checkpoint.com/', 'CHECK POINT THREATCLOUD', this)"
                    class="source-btn">
                    <span class="text-xs font-bold text-white uppercase">Check Point ThreatCloud</span>
                    <p class="text-[10px] text-gray-400 leading-tight">Aggregates data from its global intelligence
                        network to show malware, phishing, and exploit activity.</p>
                </button>
            </div>

            <div class="mt-4 p-4 bg-indigo-950/40 rounded-xl border border-indigo-500/20">
                <p class="text-[10px] text-gray-400 leading-relaxed font-medium">
                    <b class="text-indigo-300">SECURENET DEFENSE:</b> Monitoring global telemetry ensures pre-emptive
                    shielding against local variants.
                </p>
            </div>
        </aside>

        <main class="flex-1 map-container">
            <div class="map-overlay">
                <p class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-1 flex items-center gap-2">
                    <i data-lucide="scan-eye" class="w-3 h-3"></i> Intelligence Stream
                </p>
                <h3 id="map-name" class="tech text-sm font-bold text-white uppercase tracking-tight">KASPERSKY REAL-TIME
                    MAP</h3>
                <div class="mt-2">
                    <a id="external-link" href="https://cybermap.kaspersky.com/en/widget/" target="_blank"
                        class="text-[10px] bg-indigo-600 hover:bg-indigo-500 px-3 py-1 rounded font-bold transition flex items-center gap-2 w-fit">
                        OPEN SOURCE PORTAL <i data-lucide="external-link" class="w-3 h-3"></i>
                    </a>
                </div>
            </div>

            <iframe id="browser-frame" src="https://cybermap.kaspersky.com/en/widget/"
                class="w-full h-full border-none transition-opacity duration-500" allow="autoplay; fullscreen"></iframe>
        </main>
    </div>

    <script>
        lucide.createIcons();

        function changeMap(url, name, btn) {
            const frame = document.getElementById('browser-frame');
            const mapName = document.getElementById('map-name');
            const externalLink = document.getElementById('external-link');

            document.querySelectorAll('.source-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            frame.style.opacity = '0.2';
            setTimeout(() => {
                frame.src = url;
                mapName.textContent = name;
                externalLink.href = url;
                frame.style.opacity = '1';
            }, 300);
        }
    </script>
</body>

</html>
