<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SecureNet | Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="cyber-body">

    <div class="cyber-container">

        <!-- LEFT PANEL -->
        <div class="cyber-left">
            <div class="visual-wrapper">
                <div class="orbital-ring ring-1"></div>
                <div class="orbital-ring ring-2"></div>
                <div class="lock-3d">
                    <div class="lock-top"></div>
                    <div class="lock-body">
                        <div class="lock-hole"></div>
                        <div class="scan-line"></div>
                    </div>
                </div>
            </div>
            <h3>SecureNet</h3>
            <p>Cyber Defense Intelligence</p>
        </div>

        <!-- RIGHT PANEL -->
        <div class="cyber-right">
            <h2>LOGIN</h2>

            <input id="email" type="email" placeholder="Email ID">

            <div class="password-field">
                <input id="password" type="password" placeholder="Password">
                <span id="eyeWrapper" class="eye-icon" onclick="togglePassword()">
                    <i data-lucide="eye"></i>
                </span>
            </div>

            <button onclick="loginUser()">Authorize Entry</button>
            <button class="google-btn" onclick="googleLogin()">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google"
                    style="width:20px; height:20px;">
                Continue with Google
            </button>

            <!-- 🔹 ONLY ADDITION (FORGOT PASSWORD) -->
            <p class="forgot">
                <a href="forgot.html">Forgot Password?</a>
            </p>

            <p class="switch-text">
                Don’t have an account?
                <a href="signup.html">Signup</a>
            </p>

            <p id="errorBox" style="color:#ff6b6b; text-align:center; margin-top:10px;"></p>
        </div>

    </div>



    <script>
        // Clear session on load (unless it's a redirect)
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get("token");
        const role = urlParams.get("role");

        if (token && role) {
            localStorage.setItem("token", token);
            localStorage.setItem("role", role);

            setTimeout(() => {
                if (role === "admin") {
                    window.location.href = "admin_dashboard.html";
                } else {
                    window.location.href = "homepage.html";
                }
            }, 500); // Small delay to ensure storage write
        } else {
            // alert("Debug: No token in URL");
            localStorage.clear();
        }

        async function loginUser() {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            const errorBox = document.getElementById("errorBox");

            errorBox.innerText = "";

            if (!email || !password) {
                errorBox.innerText = "Please enter email and password";
                return;
            }

            try {
                const response = await fetch(`${CONFIG.API_BASE_URL}/api/login`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!data.success) {
                    errorBox.innerText = data.message;
                    return;
                }

                // 🔐 SAVE JWT TOKEN
                localStorage.setItem("token", data.token);
                localStorage.setItem("role", data.role);

                // 🔀 REDIRECT
                if (data.role === "admin") {
                    window.location.href = "admin_dashboard.html";
                } else {
                    window.location.href = "homepage.html";
                }

            } catch (err) {
                console.error(err);
                errorBox.innerText = "Server not reachable";
            }
        }

        async function googleLogin() {
            const errorBox = document.getElementById("errorBox");
            errorBox.innerText = "";
            try {
                const response = await fetch(`${CONFIG.API_BASE_URL}/api/login/google`, { method: "POST" });
                const data = await response.json();

                if (data.success && data.auth_url) {
                    // Redirect to Google
                    window.location.href = data.auth_url;
                } else {
                    errorBox.innerText = data.message || "Google Sign-In Failed";
                }
            } catch (err) {
                console.error(err);
                errorBox.innerText = "Google Sign-In Error";
            }
        }
        // Toggle Password Visibility
        function togglePassword() {
            const passwordInput = document.getElementById("password");
            const eyeWrapper = document.getElementById("eyeWrapper");

            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                eyeWrapper.innerHTML = '<i data-lucide="eye-off"></i>';
            } else {
                passwordInput.type = "password";
                eyeWrapper.innerHTML = '<i data-lucide="eye"></i>';
            }
            lucide.createIcons();
        }

        // Initialize Icons
        lucide.createIcons();
    </script>

</body>

</html>
