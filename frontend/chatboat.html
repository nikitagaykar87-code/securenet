<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureNet AI Assistant</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@600;700;800&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #070221;
            color: white;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tech {
            font-family: 'Exo 2', sans-serif
        }

        #chat-messages::-webkit-scrollbar {
            width: 4px
        }

        #chat-messages::-webkit-scrollbar-thumb {
            background: #6366f1;
            border-radius: 10px
        }

        .chat-bot {
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(99, 102, 241, .25);
            border-radius: 20px 20px 20px 6px;
        }

        .chat-user {
            background: #4f46e5;
            border-radius: 20px 20px 6px 20px;
            align-self: flex-end;
        }

        .action-btn {
            background: rgba(99, 102, 241, .1);
            border: 1px solid rgba(99, 102, 241, .35);
            color: #a5b4fc;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: .25s;
        }

        .action-btn:hover {
            background: #4f46e5;
            color: white;
            transform: translateX(6px);
        }

        .typing {
            display: flex;
            gap: 6px;
        }

        .typing span {
            width: 6px;
            height: 6px;
            background: #818cf8;
            border-radius: 50%;
            animation: blink 1.4s infinite both;
        }

        .typing span:nth-child(2) {
            animation-delay: .2s
        }

        .typing span:nth-child(3) {
            animation-delay: .4s
        }

        @keyframes blink {
            0% {
                opacity: .2
            }

            20% {
                opacity: 1
            }

            100% {
                opacity: .2
            }
        }
    </style>
    </style>
    <script src="auth_guard.js"></script>
    <script src="config.js"></script>
</head>

<body style="display:none">

    <!-- HEADER (UNCHANGED) -->
    <div class="p-6 bg-indigo-700/90 flex items-center justify-between border-b border-white/10">
        <div class="flex items-center gap-3">
            <img src="logo.png" class="w-10 h-10 rounded">
            <div>
                <h2 class="tech text-lg font-bold">SECURENET AI</h2>
                <div class="flex items-center gap-1.5 mt-1">
                    <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                    <span class="text-[10px] font-bold text-green-400 uppercase">System Active</span>
                </div>
            </div>
        </div>
    </div>

    <!-- CHAT BODY -->
    <div id="chat-messages" class="flex-1 p-6 overflow-y-auto space-y-6">
        <div class="chat-bot p-4 text-sm">
            👋 Welcome to <b class="text-indigo-400">SecureNet AI</b>.<br>
            I help with scams, hacked accounts, and cyber safety.
        </div>

        <div class="grid grid-cols-1 gap-3 pr-10">
            <button class="action-btn" onclick="quick('report')">
                <i data-lucide="shield-alert" class="w-4 h-4"></i>
                Report Cyber Crime (1930)
            </button>
            <button class="action-btn" onclick="quick('tools')">
                <i data-lucide="zap" class="w-4 h-4"></i>
                Open Detector Tools
            </button>
            <button class="action-btn" onclick="quick('map')">
                <i data-lucide="globe" class="w-4 h-4"></i>
                Live Threat Map
            </button>
            <button class="action-btn" onclick="quick('quiz')">
                <i data-lucide="help-circle" class="w-4 h-4"></i>
                Cyber Awareness Quiz
            </button>
        </div>
    </div>

    <!-- INPUT -->
    <div class="p-6 bg-black/40 border-t border-white/5">
        <form id="chat-form" class="flex gap-2">
            <input id="user-input" placeholder="Ask about phishing, OTP, hacked account…"
                class="flex-1 bg-white/5 border border-white/10 rounded-xl px-5 py-3 text-sm text-white">
            <button class="bg-indigo-600 p-3 rounded-xl">
                <i data-lucide="send" class="w-5 h-5"></i>
            </button>
        </form>
    </div>

    <script>
        lucide.createIcons();

        const chat = document.getElementById("chat-messages");

        const KB = {
            report: "🚨 Call <b>1930</b> immediately and report on cybercrime.gov.in",
            tools: "🛠️ <a href='detectors.html' class='text-indigo-400 underline'>Open Detector Tools</a>",
            map: "🌍 <a href='browser.html' class='text-indigo-400 underline'>Open Live Threat Map</a>",
            quiz: "🎯 <a href='quizzes.html' class='text-indigo-400 underline'>Start Cyber Quiz</a>"
        };

        function addBot(text) {
            const d = document.createElement("div");
            d.className = "chat-bot p-4 text-sm";
            d.innerHTML = marked.parse(text);
            chat.appendChild(d);
            chat.scrollTop = chat.scrollHeight;
        }

        function addUser(text) {
            const d = document.createElement("div");
            d.className = "chat-user p-4 text-sm max-w-[85%]";
            d.textContent = text;
            chat.appendChild(d);
        }

        function typing() {
            const t = document.createElement("div");
            t.className = "chat-bot p-3";
            t.innerHTML = "<div class='typing'><span></span><span></span><span></span></div>";
            chat.appendChild(t);
            chat.scrollTop = chat.scrollHeight;
            return t;
        }

        function quick(key) {
            addUser(key);
            const t = typing();
            setTimeout(() => {
                t.remove();
                addBot(KB[key]);
            }, 600);
        }

        async function sendToAI(text) {
            const t = typing();
            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/api/chatbot/ask`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                t.remove();
                addBot(data.reply);
            } catch {
                t.remove();
                addBot("⚠️ SecureNet AI unavailable. Try again.");
            }
        }

        document.getElementById("chat-form").onsubmit = e => {
            e.preventDefault();
            const input = document.getElementById("user-input");
            if (!input.value.trim()) return;
            const text = input.value;
            addUser(text);
            input.value = "";
            sendToAI(text);
        };
    </script>

</body>

</html>
